# Taskfile.yml — cross-platform task runner.
# Works on Mac, Linux, and Windows without GNU Make.
#
# Install Task:
#   Mac/Linux: brew install go-task
#   Windows:   scoop install task  OR  winget install Task.Task
#   Any:       https://taskfile.dev/installation/
#
# Usage:
#   task build
#   task test
#   task --list    (show all tasks)
#
# All targets are equivalent to their Makefile counterparts.

version: "3"

vars:
  BINARY: overcast
  BUILD_DIR: ./bin
  VERSION:
    sh: cat VERSION
  ACTIONLINT_VERSION: v1.7.7

tasks:
  default:
    cmds:
      - task --list
    silent: true

  # ---- Setup ----------------------------------------------------------------

  setup:
    desc: Verify all dev tools are installed
    cmds:
      - go run ./scripts/check-tools.go

  # ---- Build ----------------------------------------------------------------

  build:
    desc: Compile the binary for the current platform (includes embedded web UI)
    cmds:
      - cmd: mkdir -p {{.BUILD_DIR}}
        platforms: [darwin, linux]
      - cmd: if not exist {{.BUILD_DIR}} mkdir {{.BUILD_DIR}}
        platforms: [windows]
      - go build -trimpath -ldflags="-w -s -X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.BINARY}}{{exeExt}} ./cmd/overcast
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}{{exeExt}}"

  build-web:
    desc: Build the web UI (run before build if assets are stale)
    deps: [docs-index]
    dir: web
    env:
      VITE_BUNDLED: "true"
    cmds:
      - npm run build

  build-slim:
    desc: Compile the slim binary (no web UI) for the current platform
    cmds:
      - cmd: mkdir -p {{.BUILD_DIR}}
        platforms: [darwin, linux]
      - cmd: if not exist {{.BUILD_DIR}} mkdir {{.BUILD_DIR}}
        platforms: [windows]
      - go build -trimpath -tags slim -ldflags="-w -s -X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/overcastd{{exeExt}} ./cmd/overcast

  # ---- Run ------------------------------------------------------------------

  run:
    desc: Build and run with dev defaults (cross-platform Go script)
    cmds:
      - go run ./scripts/run.go

  dev-server:
    desc: Watch Go sources and hot-reload the server (requires air)
    cmds:
      - air

  # ---- Test -----------------------------------------------------------------

  test:
    desc: Run all tests (race detector enabled where supported)
    cmds:
      - go test -race -count=1 -timeout=120s ./...

  test-unit:
    desc: Run unit tests only (fast — no server startup)
    cmds:
      - go test -race -count=1 -timeout=60s ./internal/...

  test-integration:
    desc: Run integration tests only
    cmds:
      - go test -race -count=1 -timeout=120s ./tests/...

  test-coverage:
    desc: Run tests and open HTML coverage report
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - cmd: open coverage.html
        platforms: [darwin]
      - cmd: start coverage.html
        platforms: [windows]
      - cmd: xdg-open coverage.html
        platforms: [linux]

  # ---- Docs -----------------------------------------------------------------

  generate-caps:
    desc: Generate service capability metadata
    cmds:
      - go run -tags dev ./cmd/capgen --generate

  check-caps:
    desc: Verify capabilities declarations match handlers
    cmds:
      - go run -tags dev ./cmd/capgen --check

  docs-index:
    desc: Generate the web docs search/navigation manifest
    cmds:
      - go run ./scripts/docs-index.go --write-index --write-go-index

  docs:
    desc: Regenerate service docs and docs search index
    deps: [generate-caps]
    cmds:
      - go run -tags dev ./cmd/capgen --write-docs
      - go run ./scripts/docs-index.go --write-index --write-go-index

  docs-check:
    desc: Verify generated docs artifacts are up to date
    deps: [check-caps]
    cmds:
      - go run -tags dev ./cmd/capgen --generate
      - git diff --exit-code internal/capabilities/all.gen.go
      - go run -tags dev ./cmd/capgen --write-docs
      - go run ./scripts/docs-index.go --check
      - git diff --exit-code README.md STATUS.md docs/README.md docs/services/ docs/generated/service-support.json web/src/generated/docs-index.ts internal/docssearch/index_gen.go

  # ---- Quality --------------------------------------------------------------

  bench:
    desc: Run benchmarks with memory allocation reporting
    cmds:
      - go test -bench=. -benchmem -count=3 ./...

  lint:
    desc: Run all linters (Go/emulation, web UI, GitHub Actions)
    deps: [lint-go, lint-web, lint-actions]

  lint-go:
    desc: Run golangci-lint for Go/emulation code
    cmds:
      - golangci-lint run ./...

  lint-web:
    desc: Run web UI linting
    dir: web
    cmds:
      - npm run lint

  lint-actions:
    desc: Lint GitHub Actions workflows
    cmds:
      - go run github.com/rhysd/actionlint/cmd/actionlint@{{.ACTIONLINT_VERSION}} .github/workflows/*.yml

  fmt:
    desc: Format all Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy and verify go.mod / go.sum
    cmds:
      - go mod tidy
      - go mod verify

  check:
    desc: Run all pre-PR checks (fmt + vet + lint + test)
    deps: [fmt, vet, lint, test]

  # ---- Docker ---------------------------------------------------------------

  docker:
    desc: Build both Docker images (console + slim)
    deps: [docker-console, docker-slim]

  docker-console:
    desc: Build the Docker image with web console
    cmds:
      - docker build -t overcast:dev .

  docker-slim:
    desc: Build the slim Docker image (no web UI, for CI)
    cmds:
      - docker build --target slim -t overcast-slim:dev .

  docker-run:
    desc: Run the Docker image with debug logging
    cmds:
      - docker run --rm -p 4566:4566 -e OVERCAST_LOG_LEVEL=debug overcast:dev

  docker-compose:
    desc: Start with docker compose (rebuilds image)
    cmds:
      - docker compose up --build

  # ---- Clean ----------------------------------------------------------------

  clean:
    desc: Remove build artefacts
    cmds:
      - go clean ./...
      - cmd: rm -rf {{.BUILD_DIR}} coverage.out coverage.html
        platforms: [darwin, linux]
      - cmd: if exist {{.BUILD_DIR}} rmdir /s /q {{.BUILD_DIR}}
        platforms: [windows]
      - cmd: if exist coverage.out del /q coverage.out
        platforms: [windows]
      - cmd: if exist coverage.html del /q coverage.html
        platforms: [windows]

  # ---- Container-based development (cross-platform) ------------------------
  # These targets work identically on Mac, Linux, and Windows.
  # Require Docker but not a local Go installation.

  container-test:
    desc: Run all tests inside a Linux container (works on any OS with Docker)
    cmds:
      - docker compose -f docker-compose.dev.yml run --rm test

  container-test-unit:
    desc: Run unit tests inside a container
    cmds:
      - docker compose -f docker-compose.dev.yml run --rm test go test -race -count=1 -timeout=60s ./internal/...

  container-test-integration:
    desc: Run integration tests inside a container
    cmds:
      - docker compose -f docker-compose.dev.yml run --rm test go test -race -count=1 -timeout=120s ./tests/...

  dev:
    desc: Start the dev server with source mounted (no local Go needed)
    cmds:
      - docker compose -f docker-compose.dev.yml up overcast

  dev-build:
    desc: Force rebuild of the dev server container
    cmds:
      - docker compose -f docker-compose.dev.yml up --build overcast
