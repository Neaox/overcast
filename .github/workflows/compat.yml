name: Compatibility Tests

# Runs compatibility suites against live, isolated Overcast instances. Suite
# failures are expected and recorded as coverage data; infrastructure failures
# still fail the affected suite job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite(s) to run — comma-separated (empty = all)"
        required: false
        default: ""

jobs:
  prepare-matrix:
    name: Prepare suite matrix
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
    steps:
      - name: Resolve suites
        id: suites
        env:
          SUITE_INPUT: ${{ github.event.inputs.suite }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, sys

          all_suites = [
              "node-js-sdk",
              "python-sdk",
              "go-sdk",
              "cli",
              "cdk",
              "java-sdk",
              "dotnet-sdk",
              "rust-sdk",
          ]
          raw = os.environ.get("SUITE_INPUT", "")
          if raw.strip():
              requested = [s.strip() for s in raw.split(",") if s.strip()]
              unknown = [s for s in requested if s not in all_suites]
              if unknown:
                  print(f"Unknown compat suite(s): {', '.join(unknown)}", file=sys.stderr)
                  sys.exit(1)
              suites = [s for s in all_suites if s in requested]
          else:
              suites = all_suites
          print(f"suites={json.dumps(suites)}")
          PY

  rust-sdk-image:
    name: Prepare rust-sdk compat image
    needs: prepare-matrix
    if: contains(needs.prepare-matrix.outputs.suites, '"rust-sdk"')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        run: |
          TAG=$(compat/suites/rust-sdk/image-tag.sh)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed rust-sdk compat image tag: ${TAG}"

      - name: Detect rust-sdk image input changes
        id: changes
        run: |
          changed=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_files=$(git diff --name-only HEAD^1 HEAD)
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              changed_files=$(git ls-tree -r --name-only "$head")
            else
              changed_files=$(git diff --name-only "$before" "$head")
            fi
          else
            changed_files=""
          fi

          while IFS= read -r path; do
            case "$path" in
              compat/suites/rust-sdk/*|compat/suites/registry.json|.github/workflows/compat.yml)
                changed=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "Rust SDK image inputs changed: ${changed}"

      - name: Set lowercase image name
        id: img
        run: |
          REPO_LC=$(tr '[:upper:]' '[:lower:]' <<< "${{ github.repository }}")
          echo "image=ghcr.io/${REPO_LC}/rust-sdk-compat" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: exists
        if: github.event_name != 'pull_request'
        run: |
          if docker manifest inspect "${{ steps.img.outputs.image }}:${{ steps.tag.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Exact rust-sdk compat image already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Exact rust-sdk compat image is missing."
          fi

      - uses: docker/setup-buildx-action@v4.2.0
        if: steps.changes.outputs.changed == 'true' || (github.event_name != 'pull_request' && steps.exists.outputs.exists != 'true')

      - name: Build and maybe push image
        if: steps.changes.outputs.changed == 'true' || (github.event_name != 'pull_request' && steps.exists.outputs.exists != 'true')
        uses: docker/build-push-action@v7.3.0
        with:
          context: compat/suites
          file: compat/suites/rust-sdk/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha,scope=rust-sdk-compat
          cache-to: type=gha,mode=max,scope=rust-sdk-compat

  build-binaries:
    name: Build Overcast compat binaries
    needs: prepare-matrix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: npm ci && VITE_BUNDLED=true npm run build
        working-directory: web

      - name: Build binaries
        run: |
          mkdir -p bin
          go build -o bin/overcast ./cmd/overcast
          go build -o bin/compat ./cmd/compat

      - name: Upload binaries
        uses: actions/upload-artifact@v7.0.1
        with:
          name: overcast-compat-binaries-${{ github.sha }}
          path: |
            bin/overcast
            bin/compat
          if-no-files-found: error
          retention-days: 7

  compat:
    name: Compatibility Tests (${{ matrix.suite }})
    needs:
      - prepare-matrix
      - build-binaries
      - rust-sdk-image
    if: always() && needs.prepare-matrix.result == 'success' && needs.build-binaries.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.prepare-matrix.outputs.suites) }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Download binaries
        uses: actions/download-artifact@v7.0.0
        with:
          name: overcast-compat-binaries-${{ github.sha }}
          path: .

      - name: Make binaries executable
        run: chmod +x bin/overcast bin/compat

      - uses: actions/setup-go@v6.5.0
        if: contains(fromJson('["go-sdk", "cli"]'), matrix.suite)
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: |
            go.sum
            compat/suites/go-sdk/go.sum

      - uses: actions/setup-node@v6.4.0
        if: contains(fromJson('["node-js-sdk", "cdk"]'), matrix.suite)
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            compat/suites/node-js-sdk/package-lock.json
            compat/suites/cdk/package-lock.json

      - uses: actions/setup-python@v6.3.0
        if: matrix.suite == 'python-sdk'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: compat/suites/python-sdk/requirements.txt

      - name: Install Node.js deps (node-js-sdk)
        if: matrix.suite == 'node-js-sdk'
        run: npm ci
        working-directory: compat/suites/node-js-sdk

      - name: Install Node.js deps (cdk)
        if: matrix.suite == 'cdk'
        run: npm ci
        working-directory: compat/suites/cdk

      - name: Type check cdk suite
        if: matrix.suite == 'cdk'
        run: npm run typecheck
        working-directory: compat/suites/cdk

      - name: Install Python deps (python-sdk)
        if: matrix.suite == 'python-sdk'
        run: pip install --quiet -r requirements.txt
        working-directory: compat/suites/python-sdk

      - name: Start Overcast
        run: |
          OVERCAST_PORT=4566 \
          OVERCAST_STATE=memory \
          OVERCAST_LOG_LEVEL=warn \
            ./bin/overcast serve &
          echo "OVERCAST_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Overcast to become healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_health > /dev/null; then
              echo "Overcast ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "Overcast did not become healthy within 30 s" >&2
          exit 1

      - name: Run compat suite
        env:
          OVERCAST_ENDPOINT: http://localhost:4566
          OVERCAST_COMPAT_SKIP_DOCKER: "1"
          OVERCAST_COMPAT_RESULTS_FILE: compat-results-${{ matrix.suite }}.json
        run: |
          ./bin/compat \
            --endpoint http://localhost:4566 \
            --format pretty \
            --suite "${{ matrix.suite }}" \
            --results-file "compat-results-${{ matrix.suite }}.json"

      - name: Stop Overcast
        if: always()
        run: |
          if [[ -n "${OVERCAST_PID:-}" ]]; then
            kill "$OVERCAST_PID" 2>/dev/null || true
          fi

      - name: Upload suite compat results
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: compat-results-${{ matrix.suite }}-${{ github.sha }}
          path: compat-results-${{ matrix.suite }}.json
          if-no-files-found: error
          retention-days: 90

  aggregate:
    name: Aggregate Compatibility Results
    needs:
      - prepare-matrix
      - compat
    if: always() && needs.prepare-matrix.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go.sum

      - name: Download suite results
        uses: actions/download-artifact@v7.0.0
        with:
          pattern: compat-results-*-${{ github.sha }}
          path: compat-results
          merge-multiple: true

      - name: Merge suite results
        run: |
          go run ./cmd/compat \
            --merge-results "compat-results/compat-results-*.json" \
            --results-file compat-results.json \
            --format pretty

      - name: Upload merged compat results
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: compat-results-${{ github.sha }}
          path: compat-results.json
          if-no-files-found: error
          retention-days: 90

      - name: Attach results to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: compat-results.json

      - name: Write job summary
        if: always()
        run: |
          echo "## Compatibility Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f compat-results.json ]]; then
            python3 - <<'PY'
          import json, os

          with open("compat-results.json") as f:
              data = json.load(f)

          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(out, "a") as f:
              suites = data.get("Suites", [])
              f.write("| Suite | Pass | Fail | Unimplemented | Skip | Total |\n")
              f.write("| ----- | ---: | ---: | ------------: | ---: | ----: |\n")
              total_pass = total_fail = total_unimplemented = total_skip = total_all = 0
              for s in suites:
                  p = s.get("Passed", 0)
                  fa = s.get("Failed", 0)
                  un = s.get("Unimplemented", 0)
                  sk = s.get("Skipped", 0)
                  tot = p + fa + un + sk
                  f.write(f"| {s['Suite']} | {p} | {fa} | {un} | {sk} | {tot} |\n")
                  total_pass += p
                  total_fail += fa
                  total_unimplemented += un
                  total_skip += sk
                  total_all += tot
              f.write(f"| **Total** | **{total_pass}** | **{total_fail}** | **{total_unimplemented}** | **{total_skip}** | **{total_all}** |\n")
              endpoint = data.get("Endpoint", "")
              if endpoint:
                  f.write(f"\nEndpoint: `{endpoint}`\n")
          PY
          else
            echo "_compat-results.json not found — a suite may have failed before writing results._" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
