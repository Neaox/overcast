name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  vet:
    name: Vet
    needs: web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Install dependencies
        run: go mod download

      - uses: ./.github/actions/generate-docs-index

      - name: Vet
        run: go vet ./...

  coverage:
    name: Full test suite with coverage
    needs: web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Install dependencies
        run: go mod download

      - uses: ./.github/actions/generate-docs-index

      - name: Full test suite with coverage
        run: |
          go test -race -count=1 -timeout=1200s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  sqs-protocol-dispatch:
    name: SQS integration tests (protocol dispatch)
    needs: web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Install dependencies
        run: go mod download

      - uses: ./.github/actions/generate-docs-index

      - name: Vet
        run: go vet ./...

      - name: SQS integration tests (protocol dispatch)
        run: OVERCAST_PROTOCOL_DISPATCH=1 go test -race -count=1 -timeout=300s ./tests/integration/sqs/...

  lint:
    name: Lint
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - uses: ./.github/actions/generate-docs-index
      - name: Run Go lint
        run: make lint-go

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: rhysd/actionlint@v1.7.7

  docs-check:
    name: Docs and capability registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make docs-check

  web:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build SPA
        # npm run build's docs:index prestep needs Go — it regenerates
        # web/src/docs-index.gen.ts, gitignored, see .gitignore.
        run: VITE_BUNDLED=true npm run build
      - name: Build BFF server
        run: npm run build:server
      - name: Upload web assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  cross-build:
    name: Cross-build ${{ matrix.asset }}
    needs: web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: overcast-linux-amd64
            goos: linux
            goarch: amd64
            tags: ""
          - asset: overcast-linux-arm64
            goos: linux
            goarch: arm64
            tags: ""
          - asset: overcast-darwin-amd64
            goos: darwin
            goarch: amd64
            tags: ""
          - asset: overcast-darwin-arm64
            goos: darwin
            goarch: arm64
            tags: ""
          - asset: overcast-windows-amd64.exe
            goos: windows
            goarch: amd64
            tags: ""
          - asset: overcastd-linux-amd64
            goos: linux
            goarch: amd64
            tags: slim,nosqlite
          - asset: overcastd-linux-arm64
            goos: linux
            goarch: arm64
            tags: slim,nosqlite
          - asset: overcastd-darwin-amd64
            goos: darwin
            goarch: amd64
            tags: slim,nosqlite
          - asset: overcastd-darwin-arm64
            goos: darwin
            goarch: arm64
            tags: slim,nosqlite
          - asset: overcastd-windows-amd64.exe
            goos: windows
            goarch: amd64
            tags: slim,nosqlite
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-dist
          path: web/dist
      - uses: ./.github/actions/generate-docs-index
      - uses: ./.github/actions/build-overcast-binary
        with:
          asset: ${{ matrix.asset }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          tags: ${{ matrix.tags }}
          version: ci

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: console
            tag: overcast:ci
            target: ""
          - image: slim
            tag: overcast-slim:ci
            target: slim
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build image
        env:
          TAG: ${{ matrix.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          args=(-t "$TAG")
          if [[ -n "$TARGET" ]]; then
            args+=(--target "$TARGET")
          fi
          docker build "${args[@]}" .
      - name: Smoke test (slim)
        if: matrix.image == 'slim'
        run: |
          docker run -d --name oc-smoke -p 4566:4566 ${{ matrix.tag }}
          sleep 2
          curl -sf http://localhost:4566/_health
          docker rm -f oc-smoke
