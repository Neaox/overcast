name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23', '1.22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 -timeout=60s ./internal/...

      - name: Integration tests
        run: go test -race -count=1 -timeout=120s ./tests/...

      - name: Coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
