name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.23"]

    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-go@v5.6.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 -timeout=60s ./internal/...

      - name: Integration tests
        run: go test -race -count=1 -timeout=300s ./tests/...

      - name: SQS integration tests (protocol dispatch)
        run: OVERCAST_PROTOCOL_DISPATCH=1 go test -race -count=1 -timeout=300s ./tests/integration/sqs/...

      - name: Coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: rhysd/actionlint@v1.7.7

  web:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        uses: wearerequired/lint-action@v2.3.0
        with:
          eslint: true
          eslint_dir: web
          eslint_extensions: js,jsx,ts,tsx
          auto_fix: false
          commit: false
          continue_on_error: false
      - name: Type check
        run: npx tsc --noEmit
      - name: Build SPA
        run: VITE_BUNDLED=true npm run build
      - name: Build BFF server
        run: npm run build:server
      - name: Upload web assets
        uses: actions/upload-artifact@v4.6.2
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  cross-build:
    name: Cross-build ${{ matrix.asset }}
    needs: web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: overcast-linux-amd64
            goos: linux
            goarch: amd64
            tags: ""
          - asset: overcast-linux-arm64
            goos: linux
            goarch: arm64
            tags: ""
          - asset: overcast-darwin-amd64
            goos: darwin
            goarch: amd64
            tags: ""
          - asset: overcast-darwin-arm64
            goos: darwin
            goarch: arm64
            tags: ""
          - asset: overcast-windows-amd64.exe
            goos: windows
            goarch: amd64
            tags: ""
          - asset: overcastd-linux-amd64
            goos: linux
            goarch: amd64
            tags: slim,nosqlite
          - asset: overcastd-linux-arm64
            goos: linux
            goarch: arm64
            tags: slim,nosqlite
          - asset: overcastd-darwin-amd64
            goos: darwin
            goarch: amd64
            tags: slim,nosqlite
          - asset: overcastd-darwin-arm64
            goos: darwin
            goarch: arm64
            tags: slim,nosqlite
          - asset: overcastd-windows-amd64.exe
            goos: windows
            goarch: amd64
            tags: slim,nosqlite
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.24"
          cache: true
      - uses: actions/download-artifact@v4.3.0
        with:
          name: web-dist
          path: web/dist
      - uses: ./.github/actions/build-overcast-binary
        with:
          asset: ${{ matrix.asset }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          tags: ${{ matrix.tags }}
          version: ci

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - name: Build console image
        run: docker build -t overcast:ci .
      - name: Build slim image
        run: docker build --target slim -t overcast-slim:ci .
      - name: Smoke test (slim)
        run: |
          docker run -d --name oc-smoke -p 4566:4566 overcast-slim:ci
          sleep 2
          curl -sf http://localhost:4566/_health
          docker rm -f oc-smoke
