{{define "branding_script"}}
    <script>
    (function(){
      window.addEventListener('message',function(e){
        var d=e.data; if(!d||d.type!=='branding-preview') return;
        var r=document.documentElement.style;
        if(d.BackgroundColor!==undefined) r.setProperty('--brand-bg',d.BackgroundColor||'#f5f5f5');
        if(d.PrimaryColor!==undefined) r.setProperty('--brand-primary',d.PrimaryColor||'#0073bb');
        if(d.FontFamily!==undefined) r.setProperty('--brand-font',d.FontFamily||'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif');
        if(d.LogoURL!==undefined){var img=document.getElementById('brand-logo'),wrap=document.getElementById('brand-logo-wrap');if(d.LogoURL){if(img)img.src=d.LogoURL;if(wrap)wrap.style.display='';}else{if(wrap)wrap.style.display='none';}}
        if(d.CustomCSS!==undefined){var s=document.getElementById('brand-custom-css');if(s)s.textContent=d.CustomCSS||'';}
      });
      if(window.parent!==window) window.parent.postMessage({type:'branding-preview-ready'},'*');
    })();
    </script>
{{end}}
