<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - {{.PoolName}}</title>
    <style>
      :root {
        --brand-bg: {{if .Branding.BackgroundColor}}{{.Branding.BackgroundColor}}{{else}}#f5f5f5{{end}};
        --brand-primary: {{if .Branding.PrimaryColor}}{{.Branding.PrimaryColor}}{{else}}#0073bb{{end}};
        --brand-font: {{if .Branding.FontFamily}}{{.Branding.FontFamily}}{{else}}-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif{{end}};
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--brand-font);
        background: var(--brand-bg);
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 1rem;
      }
      .card {
        background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        padding: 2rem; width: 100%; max-width: 400px;
      }
      .logo { text-align: center; margin-bottom: 1.5rem; }
      .logo img { max-height: 48px; }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; text-align: center; }
      .subtitle { color: #666; font-size: 0.875rem; text-align: center; margin-bottom: 1.5rem; }
      .field { margin-bottom: 1rem; }
      label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.25rem; color: #333; }
      input[type="text"], input[type="password"], input[type="email"] {
        width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px;
        font-size: 0.9375rem; transition: border-color 0.15s;
      }
      input:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand-primary) 13%, transparent); }
      .btn {
        display: block; width: 100%; padding: 0.625rem; border: none; border-radius: 4px;
        font-size: 0.9375rem; font-weight: 500; cursor: pointer; text-align: center;
        background: var(--brand-primary);
        color: #fff; margin-top: 1.25rem; transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.9; }
      .error { background: #fef2f2; color: #b91c1c; padding: 0.625rem 0.75rem; border-radius: 4px; font-size: 0.8125rem; margin-bottom: 1rem; }
      .links { margin-top: 1.25rem; text-align: center; font-size: 0.8125rem; }
      .links a { color: var(--brand-primary); text-decoration: none; }
      .links a:hover { text-decoration: underline; }
      .divider { color: #999; margin: 0 0.5rem; }
      .powered { text-align: center; margin-top: 1.5rem; font-size: 0.6875rem; color: #999; }
    </style>
    <style id="brand-custom-css">{{if .Branding.CustomCSS}}{{.Branding.CustomCSS}}{{end}}</style>
  </head>
  <body>
    <div class="card">
      <div class="logo" id="brand-logo-wrap"{{if not .Branding.LogoURL}} style="display:none"{{end}}><img id="brand-logo" src="{{.Branding.LogoURL}}" alt="Logo" /></div>
      <h1>Sign in</h1>
      <p class="subtitle">{{.PoolName}}</p>

      {{if .Error}}
      <div class="error">{{.Error}}</div>
      {{end}}

      <form method="POST" action="{{.FormAction}}">
        <input type="hidden" name="client_id" value="{{.ClientID}}" />
        <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}" />
        <input type="hidden" name="response_type" value="{{.ResponseType}}" />
        <input type="hidden" name="scope" value="{{.Scope}}" />
        <input type="hidden" name="state" value="{{.State}}" />
        {{if .CodeChallenge}}<input
          type="hidden"
          name="code_challenge"
          value="{{.CodeChallenge}}"
        />{{end}} {{if .ChallengeMethod}}<input
          type="hidden"
          name="code_challenge_method"
          value="{{.ChallengeMethod}}"
        />{{end}} {{if .Nonce}}<input
          type="hidden"
          name="nonce"
          value="{{.Nonce}}"
        />{{end}}

        <div class="field">
          <label for="username">{{.UsernameLabel}}</label>
          <input
            type="{{.UsernameInputType}}"
            id="username"
            name="username"
            autocomplete="{{.UsernameAutocomplete}}"
            required
            autofocus
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn">Sign in</button>
      </form>

      <div class="links">
        {{if .AllowSelfRegistration}}<a href="{{.SignUpURL}}">Create account</a
        ><span class="divider">|</span>{{end}}
        <a href="{{.ForgotPasswordURL}}">Forgot password?</a>
      </div>

      <div class="powered">Powered by Overcast (Cognito emulator)</div>
    </div>
    {{template "branding_script"}}
  </body>
</html>
