operations:
  CreateStack:
    status: implementation_mismatch
    aws_docs:
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-sqs-queue.html
    tests:
      - tests/integration/cloudformation/cloudformation_test.go
    scenarios:
      - name: sqs queue ref output resolves to queue url
        status: fixed
        tests:
          - tests/integration/cloudformation/cloudformation_test.go
        notes: AWS::SQS::Queue Ref returns the queue URL, while Fn::GetAtt Arn returns the queue ARN. The SQS resource handler now preserves that Ref override on create and update.
      - name: sqs fifo generated queue name and attributes
        status: fixed
        tests:
          - tests/integration/cloudformation/cloudformation_test.go
        notes: AWS::SQS::Queue with FifoQueue true and no QueueName now generates a .fifo queue name and forwards FIFO attributes to SQS.
      - name: resource ref overrides for non-name physical ids
        status: implementation_mismatch
        tests: []
        notes: Audit found likely gaps for IAM Policy, IAM InstanceProfile, IAM ServiceLinkedRole, Events EventBus, and Events Rule. Each needs AWS-doc-backed Ref tests before changing behavior.
findings:
  fixed:
    - AWS::SQS::Queue Ref now resolves to the queue URL instead of the ARN, so CDK queue.queueUrl outputs are externally usable by SQS clients.
    - AWS::SQS::Queue FifoQueue now creates a FIFO-compatible generated physical name and FifoQueue=true queue attributes.
  remaining_gaps:
    - Audit resource-type tracking against provisioner registrations.
    - Add CloudFormation Ref compatibility tests for resource handlers whose physical ID differs from documented Ref semantics.
    - Review update/delete semantics and unsupported-resource stubbing.
  intentionally_partial: []
handoff:
  start_with: [CloudFormation Ref semantics for IAM and EventBridge resource handlers, CreateStack, DeleteStack, resource handlers]
  do_not_redo: []
  commands: [go test -count=1 ./internal/services/cloudformation/... ./tests/integration/cloudformation/...]
