service: sqs
status: in_progress
priority: p0
reference_policy: aws_docs_only_unless_user_approves_real_aws
last_updated: 2026-07-16
protocols:
  - aws_json_1_0
  - query
implementation:
  - internal/services/sqs
integration_tests:
  - tests/integration/sqs
capability_docs: docs/services/sqs.md
operations:
  ReceiveMessage:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_ReceiveMessage.html
      - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_CreateQueue.html
    tests:
      - internal/services/sqs/handler_test.go
      - tests/integration/sqs/sqs_test.go
    scenarios:
      - name: standard queue empty short poll
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Returns zero messages.
      - name: standard queue empty long poll
        status: fixed
        tests:
          - internal/services/sqs/handler_test.go
          - tests/integration/sqs/sqs_test.go
        notes: Context cancellation before or during empty long poll no longer returns 500; HTTP handler isolates store reads from request cancellation while still using the request context to stop waiting.
      - name: standard queue one visible message
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Returns message and receipt handle.
      - name: message invisible due to visibility timeout
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Subsequent receive returns zero messages while the visibility timeout is active; queue default VisibilityTimeout, explicit ReceiveMessage VisibilityTimeout, and VisibilityTimeout=0 immediate re-visibility are covered.
      - name: FIFO queue with message groups
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: FIFO receive respects per-group blocking, validates ReceiveRequestAttemptId length/characters, and retries with the same ReceiveRequestAttemptId return the same in-flight message IDs and receipt handles while resetting visibility.
      - name: queue with DLQ redrive policy
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Messages move to the configured DLQ only when ApproximateReceiveCount exceeds maxReceiveCount; the maxReceiveCount-th receive is still delivered.
      - name: JSON protocol empty response shape
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Empty AWS JSON ReceiveMessage responses now omit the Messages member instead of returning an empty array.
      - name: Query protocol empty response shape
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Empty Query ReceiveMessage responses include an empty ReceiveMessageResult with no Message elements.
      - name: invalid MaxNumberOfMessages and WaitTimeSeconds
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: MaxNumberOfMessages rejects explicit values outside 1..10 for JSON and Query; WaitTimeSeconds rejects explicit values outside 0..20.
      - name: queue-level ReceiveMessageWaitTimeSeconds default
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: JSON and Query ReceiveMessage requests that omit WaitTimeSeconds inherit the queue's ReceiveMessageWaitTimeSeconds attribute; explicit WaitTimeSeconds=0 overrides the queue default and short polls.
      - name: invalid queue-level ReceiveMessageWaitTimeSeconds
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: CreateQueue and SetQueueAttributes reject malformed values and integers outside AWS's documented 0..20 range instead of storing invalid queue defaults.
      - name: malformed persisted queue or message record
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Malformed emulator state records are isolated; list/receive skips malformed scanned records, and a malformed targeted queue is treated as non-existent instead of returning InternalError.
      - name: attribute projection (AttributeNames/MessageSystemAttributeNames/MessageAttributeNames)
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
          - internal/services/sqs/handler_test.go
        notes: System Attributes are now returned only when requested via AttributeNames (deprecated) or MessageSystemAttributeNames; user MessageAttributes only when requested via MessageAttributeNames. "All"/".*" selectors and "prefix.*" message-attribute selectors are honored. Previously all attributes were returned unconditionally, diverging from AWS.
      - name: ReceiveRequestAttemptId invalidated by visibility change
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: ChangeMessageVisibility and ChangeMessageVisibilityBatch now increment a VisibilityVersion on the message, which is snapshotted into the receive attempt. On replay, if the message's version no longer matches the stored attempt version (meaning visibility was modified), the replay returns no messages — matching AWS docs which state retry only works "if none of the messages have been modified (deleted or had their visibility changes)". DeleteMessage was already covered by the existing receipt-handle check.
    evidence:
      - AWS docs state WaitTimeSeconds long polling returns no message list when no messages are available, not an error.
      - AWS API Reference documents MaxNumberOfMessages valid values as 1 to 10 and default 1.
      - AWS Developer Guide documents the maximum long polling wait time as 20 seconds and short polling when WaitTimeSeconds is 0.
      - AWS API Reference ReceiveMessage returns system Attributes only when AttributeNames/MessageSystemAttributeNames are supplied and user MessageAttributes only when MessageAttributeNames are supplied; the sample response with AttributeNames=[All] includes SenderId/SentTimestamp/ApproximateReceiveCount/ApproximateFirstReceiveTimestamp.
      - AWS API Reference CreateQueue documents ReceiveMessageWaitTimeSeconds as the queue-level ReceiveMessage wait default with valid values 0..20 and default 0.
      - AWS Developer Guide documents short polling when ReceiveMessage sets WaitTimeSeconds=0 or omits WaitTimeSeconds while the queue attribute is 0, and long polling when the effective wait is greater than 0.
      - AWS API Reference ReceiveMessage documents ReceiveRequestAttemptId for FIFO queues: retries with the same token during visibility timeout return the same messages and receipt handles for five minutes, provided messages have not been deleted or had visibility changed.
      - AWS API Reference CreateQueue documents RedrivePolicy maxReceiveCount as the threshold that must be exceeded before SQS moves a message to the dead-letter queue.
      - AWS API Reference and Developer Guide document that ReceiveMessage VisibilityTimeout applies to returned messages, omitted values use the queue default, and VisibilityTimeout=0 immediately terminates invisibility.
    gaps: []
    next_action: Review ReceiveMessage ReceiveRequestAttemptId same-group retry semantics.
  CreateQueue:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_CreateQueue.html
    tests:
      - tests/integration/sqs/sqs_test.go
    scenarios:
      - name: create standard queue
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Standard queue with defaults.
      - name: create FIFO queue
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: .fifo suffix, FifoQueue=true enforced, ContentBasedDeduplication defaults to false.
      - name: invalid name
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Queue name length/characters validated; FIFO suffix rules enforced.
      - name: invalid attributes
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Out-of-range and unknown attributes rejected.
      - name: idempotent create same attributes
        status: reviewed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Returns existing queue URL when attributes match.
      - name: idempotent create different attributes
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Now returns QueueNameExists error when creating a queue with the same name but different attribute values, matching AWS behavior.
      - name: FIFO-only attributes on standard queues
        status: fixed
        tests:
          - tests/integration/sqs/sqs_test.go
        notes: Now rejects DeduplicationScope, FifoThroughputLimit, ContentBasedDeduplication on standard queues with InvalidAttributeValue.
    evidence:
      - AWS API Reference documents QueueNameExists error for same name + different attributes.
      - AWS API Reference documents DeduplicationScope, FifoThroughputLimit, ContentBasedDeduplication as FIFO-only attributes.
    gaps: []
    next_action: Review Tags, RedrivePolicy, and encryption attributes for fidelity.
findings:
  fixed:
    - CreateQueue now rejects queue names outside the documented 1..80 character alphanumeric, hyphen, underscore, and period rules with InvalidParameterValue.
    - Empty long-poll receives no longer surface transient InternalError when the backing state layer observes context cancellation during the poll loop.
    - Initial empty long-poll scans and HTTP requests with already-canceled contexts no longer convert cancellation into SQS InternalError.
    - The documented behavior is an HTTP 200 response with no messages when no messages become available before the wait expires.
    - Empty JSON receives now omit the Messages member, and empty Query receives are covered by XML shape tests.
    - Explicit MaxNumberOfMessages outside 1..10 and WaitTimeSeconds outside 0..20 now return InvalidParameterValue instead of silently clamping or accepting the request.
    - Malformed persisted queue/message records no longer make ListQueues or ReceiveMessage return InternalError for unrelated usable queues.
    - ReceiveMessage now projects system and message attributes based on the requested AttributeNames/MessageSystemAttributeNames/MessageAttributeNames instead of always returning every attribute.
    - FIFO ReceiveMessage retries with the same ReceiveRequestAttemptId now return the same in-flight message IDs and receipt handles and reset visibility timeout.
    - ReceiveRequestAttemptId now rejects tokens longer than 128 characters or containing spaces/control characters.
    - ReceiveMessage now moves messages to a DLQ only when ApproximateReceiveCount exceeds RedrivePolicy.maxReceiveCount instead of moving on the max-count receive.
    - ReceiveMessage visibility timeout in-flight behavior is covered for queue defaults, explicit overrides, expiry, and VisibilityTimeout=0 immediate re-visibility.
    - VisibilityTimeout on ReceiveMessage, ChangeMessageVisibility, and ChangeMessageVisibilityBatch is now validated against AWS's 0..43200 range instead of silently accepting arbitrary values.
    - Omitted ReceiveMessage.WaitTimeSeconds uses the queue-level ReceiveMessageWaitTimeSeconds default for JSON and Query requests, while explicit WaitTimeSeconds=0 keeps short-poll behavior.
    - CreateQueue and SetQueueAttributes now reject invalid ReceiveMessageWaitTimeSeconds queue attributes outside AWS's 0..20 range or malformed integers.
    - ChangeMessageVisibility and ChangeMessageVisibilityBatch now increment a VisibilityVersion tracking field so ReceiveRequestAttemptId replay detects modified messages and returns empty, matching AWS docs behaviour that retries only succeed when no message has been modified.
    - CreateQueue now rejects FIFO-only attributes (DeduplicationScope, FifoThroughputLimit, ContentBasedDeduplication) on standard queues with InvalidAttributeValue.
    - CreateQueue now returns QueueNameExists error when creating a queue with the same name but different attribute values, matching AWS behavior.
    - SendMessage now validates DelaySeconds range (0-900), rejects DelaySeconds on FIFO queues, and enforces the 1 MiB message body size limit.
  remaining_gaps: []
  intentionally_partial: []
verification:
  commands:
    - go test -count=1 ./internal/services/sqs/... ./tests/integration/sqs/...
    - go vet ./internal/services/sqs/... ./tests/integration/sqs/...
    - go build ./...
    - go vet ./...
  handoff:
  start_with:
    - Review SendMessage, DeleteMessage, and GetQueueAttributes for fidelity gaps.
    - Review CreateQueue Tags, RedrivePolicy, and encryption attribute handling.
  do_not_redo:
    - Context-cancellation long-poll fix unless the regression fails.
    - ReceiveRequestAttemptId deleted/visibility-modified edge cases (now covered).
    - FIFO-only attributes on standard queues (now covered).
    - Idempotent create with different attributes (now covered).
  commands:
    - go test -count=1 ./internal/services/sqs/... ./tests/integration/sqs/...
