    - Review Query/JSON protocol parity; current service advertises QueryXML via SupportedProtocols despite tracker listing aws_json_typed.
    - Review async delivery behavior, filter policy fidelity, and SQS/Lambda/email/SMS fan-out compatibility.
  intentionally_partial: []
handoff:
