service: appsync
status: fixed
priority: p0
reference_policy: aws_docs_only_unless_user_approves_real_aws
last_updated: 2026-07-22
protocols: [rest_json, graphql_execution, websocket_realtime, aws_json_1_0, aws_json_1_1, rpcv2_cbor]
