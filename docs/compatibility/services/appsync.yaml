operations:
  CreateGraphqlApi:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/APIReference/API_CreateGraphqlApi.html
    protocol:
      method: POST
      path: /v1/apis
      content_type: application/json
      success_status: 200
    scenario_matrix:
      - scenario: Minimal API_KEY GraphQL API
        status: fixed
        evidence: TestCreateGraphqlApi_success
        notes: Returns graphqlApi with generated apiId/arn/uris/dns and defaults apiType=GRAPHQL, visibility=GLOBAL, introspectionConfig=ENABLED.
      - scenario: Missing required name
        status: fixed
        evidence: TestCreateGraphqlApi_missingName
        notes: Returns BadRequestException instead of creating an unnamed API.
      - scenario: Missing required authenticationType
        status: fixed
        evidence: TestCreateGraphqlApi_missingAuthenticationType
        notes: Returns BadRequestException instead of creating an API with empty auth type.
      - scenario: Invalid authenticationType enum
        status: fixed
        evidence: TestCreateGraphqlApi_invalidAuthenticationType
        notes: Valid values are API_KEY, AWS_IAM, AMAZON_COGNITO_USER_POOLS, OPENID_CONNECT, and AWS_LAMBDA.
      - scenario: Invalid apiType enum
        status: fixed
        evidence: TestCreateGraphqlApi_invalidApiType
        notes: Valid values are GRAPHQL and MERGED; omitted defaults to GRAPHQL.
      - scenario: Additional auth providers and nested auth/log/metrics config passthrough
        status: tests_missing
        evidence: Existing passthrough fields are stored as raw JSON, but nested shape validation is not reviewed.
      - scenario: Tag regex validation
        status: intentionally_partial
        evidence: "Handler now validates count, key/value lengths, and aws: prefix; exact AWS key/value regexes remain unimplemented."
      - scenario: CloudFormation GraphQLApi Tags array translated to AppSync tag map
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLApiTags; TestAppSyncGraphQLApiBody_cloudFormationTags; AWS CloudFormation GraphQLApi docs list Tags as an array of Tag objects while CreateGraphqlApi docs list tags as a string map.
        notes: Fixed CloudFormation/CDK deployments that previously failed with Go JSON decoder text when Tags was forwarded as an array.
      - scenario: Visibility, introspection, queryDepthLimit, resolverCountLimit, ownerContact boundaries
        status: fixed
        evidence: Handler validation added; TestCreateGraphqlApi_jsonProtocolOwnerContactTooLong covers typed/AWS JSON ownerContact length validation.
    findings:
      fixed:
        - CreateGraphqlApi now returns HTTP 200 per AWS docs instead of 201.
        - CreateGraphqlApi now rejects missing name/authenticationType and invalid top-level enum/limit inputs with BadRequestException.
      remaining_gaps:
        - Add focused tests for visibility, introspectionConfig, queryDepthLimit, resolverCountLimit, ownerContact, tag boundaries, and nested auth config scenarios.
        - Review default API key auto-creation against AWS SDK behavior; current implementation auto-creates one for API_KEY APIs but this was not re-verified in this operation review.
  CloudFormationAppSyncResources:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-graphqlapi.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-graphqlschema.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-apikey.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-datasource.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-resolver.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-functionconfiguration.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-domainname.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-domainnameapiassociation.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-apicache.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-appsync-sourceapiassociation.html
    scenario_matrix:
      - scenario: CDK-style GraphQLApi Tags array
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLApiTags; TestAppSyncGraphQLApiBody_cloudFormationTags
        notes: CloudFormation now converts Tags [{Key,Value}] to the AppSync CreateGraphqlApi tags map.
      - scenario: Core CDK GraphQL API with inline schema, NONE data source, UNIT resolver, and API key
        status: fixed
        evidence: TestCreateStack_AppSyncUsableGraphQLApi
      - scenario: Pipeline resolver with FunctionConfiguration
        status: fixed
        evidence: TestCreateStack_AppSyncPipelineResolver
      - scenario: GraphQLSchema DefinitionS3Location
        status: fixed
        evidence: TestCreateStack_AppSyncS3BackedSchemaAndResolverTemplates
      - scenario: Resolver and FunctionConfiguration S3-backed code/template locations
        status: fixed
        evidence: TestCreateStack_AppSyncS3BackedSchemaAndResolverTemplates; TestCreateStack_AppSyncPipelineFunctionS3BackedTemplates
      - scenario: GraphQLApi EnvironmentVariables
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLApiTags verifies EnvironmentVariables are provisioned through the AppSync environment variable API.
      - scenario: GraphQLApi GraphQLEndpointArn GetAtt
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLApiTags verifies GraphQLEndpointArn output is available.
      - scenario: DomainName, DomainNameApiAssociation, ApiCache, and SourceApiAssociation
        status: fixed
        evidence: TestCreateStack_AppSyncDomainCacheAndSourceAssociation provisions real AppSync domain, association, cache, and source association state and verifies outputs.
      - scenario: Events API CloudFormation resources
        status: fixed
        evidence: TestCreateStack_AppSyncEventsApiAndChannelNamespace provisions AWS::AppSync::Api and AWS::AppSync::ChannelNamespace through the real AppSync Events handlers, verifies Fn::GetAtt outputs, verifies ChannelNamespace CodeS3Location asset loading, and verifies stack deletion cleanup.
      - scenario: GraphQLSchema with AppSync built-in schema directives
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLSchemaWithAwsDirectives
        notes: CloudFormation schema creation now accepts AppSync auth/subscription directives instead of rolling back during StartSchemaCreation.
      - scenario: GraphQLSchema with AppSync built-in scalar types
        status: fixed
        evidence: TestCreateStack_AppSyncGraphQLSchemaWithAwsScalars
        notes: CloudFormation schema creation now accepts AppSync AWS scalar types such as AWSDateTime instead of rolling back during StartSchemaCreation.
      - scenario: ApiKey with CDK-style absolute Expires at upper bound
        status: fixed
        evidence: TestCreateStack_AppSyncApiKeyWithCdkStyleUpperBoundExpires
        notes: CloudFormation now accepts epoch-second Expires values 365 days from creation even when creation time is not aligned to an hour.
  CreateApiKey:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/APIReference/API_CreateApiKey.html
    scenario_matrix:
      - scenario: CDK-style absolute Expires at upper bound
        status: fixed
        evidence: TestApiKey_createWithCdkStyleUpperBoundExpires
        notes: CreateApiKey validates the upper bound against the actual creation time instead of truncating the current time down to the hour.
  StartSchemaCreation:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/devguide/scalars.html
      - https://docs.aws.amazon.com/appsync/latest/devguide/security-authz.html#using-additional-authorization-modes
      - https://docs.aws.amazon.com/appsync/latest/devguide/aws-appsync-real-time-data.html#graphql-schema-subscription-directives
    scenario_matrix:
      - scenario: Schema SDL uses AppSync built-in scalar types
        status: fixed
        evidence: TestSchema_appSyncScalars
        notes: Parser preloads definitions for AWSDate, AWSTime, AWSDateTime, AWSTimestamp, AWSEmail, AWSJSON, AWSPhone, AWSURL, and AWSIPAddress before validating SDL.
      - scenario: Schema SDL declares user-defined custom scalar
        status: fixed
        evidence: TestSchema_customScalar
        notes: AWS AppSync docs allow only default GraphQL scalars and AWS service-defined scalars; user-defined custom scalars are rejected.
      - scenario: Schema SDL declares custom object type with AWS prefix
        status: fixed
        evidence: TestSchema_customTypeWithAWSPrefix
        notes: AWS AppSync docs reserve the AWS prefix for service-defined schema types.
      - scenario: Schema SDL uses AppSync built-in auth and subscription directives
        status: fixed
        evidence: TestSchema_appSyncDirectives
        notes: Parser preloads definitions for @aws_api_key, @aws_iam, @aws_oidc, @aws_cognito_user_pools, @aws_lambda, @aws_auth, and @aws_subscribe before validating SDL.
  LambdaResolverExecution:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/devguide/resolver-mapping-template-reference-lambda.html
      - https://docs.aws.amazon.com/appsync/latest/devguide/resolver-context-reference.html
      - https://docs.powertools.aws.dev/lambda/typescript/latest/features/event-handler/appsync-graphql/
    scenario_matrix:
      - scenario: Direct Lambda resolver event with no request mapping template
        status: fixed
        evidence: TestResolveLambdaDataSource_directResolverEventShape
        notes: Direct Lambda payload now includes AppSync resolver context fields required by AWS/Powertools-compatible handlers, including identity, request.domainName, info.variables, selectionSetList, selectionSetGraphQL, stash, and prev.result.
      - scenario: Lambda resolver with evaluated request mapping template
        status: fixed
        evidence: TestResolveLambdaDataSource_requestMappingTemplatePayload
        notes: Non-empty evaluated mapping template JSON is passed to Lambda instead of being ignored and replaced with the direct resolver context.
      - scenario: Auth-specific identity shapes in Lambda resolver context
        status: fixed
        evidence: TestAuthenticateCognito_identityShape; TestAuthenticateOIDC_identityShape; TestTryAuthIAM_identityShape; TestTryAuthLambdaAuthorizer_identityShape; TestTryAuthLambdaAuthorizer_invokesFunction; TestTryAuthLambdaAuthorizer_unauthorized
        notes: Cognito and OIDC identities now include documented username/sourceIp fields, Cognito includes defaultAuthStrategy=ALLOW, IAM includes locally derivable accountId/sourceIp/user/userArn/username fields from SigV4 credentials, and configured Lambda authorizers are invoked with AWS-shaped authorization events so resolverContext is propagated. ttlOverride/cache behavior and full queryString/operationName/variables requestContext fidelity remain unimplemented.
      - scenario: Request headers and default endpoint domainName in direct Lambda resolver context
        status: fixed
        evidence: TestBuildDirectLambdaResolverEvent_defaultDomainAndHeaders
        notes: Direct resolver events now omit Cookie from request.headers and use null request.domainName for the default GraphQL endpoint.
      - scenario: Direct Lambda resolver batching with maxBatchSize
        status: fixed
        evidence: TestResolveDirectLambdaBatchDataSource; TestResolveNestedField_directLambdaBatchResolver
        notes: Nested list child fields backed by direct AWS_LAMBDA resolvers with maxBatchSize now send arrays of direct resolver context events, chunked by maxBatchSize, and map list-shaped {data,errorMessage,errorType} responses back per item. Broader batching scheduler parity should still be reviewed against real nested query cases.
      - scenario: APPSYNC_JS Lambda data source request and response semantics
        status: fixed
        evidence: TestResolveLambdaDataSource_requestMappingTemplatePayload; TestResolveLambdaDataSource_requestMappingTemplateInvalidOperation; TestResolveLambdaDataSource_requestMappingTemplateEventInvocation
        notes: Evaluated VTL/APPSYNC_JS Lambda Invoke request objects are passed through as the Lambda event, operation and invocationType are validated, and invocationType=Event resolves to null after invoking Lambda. BatchInvoke in mapped request objects is rejected until mapped batching is implemented instead of silently diverging.
      - scenario: Lambda authorizer deniedFields behavior
        status: fixed
        evidence: TestTryAuthLambdaAuthorizer_deniedFields; TestBuildDirectLambdaResolverEvent_hidesAuthorizerDeniedFields; TestDeniedFields_fullARNDoesNotDenyOtherAPI; TestFilterSubFields_authorizerDeniedStructuralField
        notes: deniedFields short names and exact matching AppSync field ARNs are honored by nulling denied fields, including structural nested fields, without exposing internal metadata in resolver identity.
      - scenario: Lambda authorizer ttlOverride/cache behavior
        status: tests_missing
        evidence: Lambda authorizer responses are invoked per request; ttlOverride and configured authorizerResultTtlInSeconds response caching are not implemented.
  TagResource:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/APIReference/API_TagResource.html
    scenario_matrix:
      - scenario: Happy-path tag/list/untag lifecycle
        status: fixed
        evidence: TestTags_crudLifecycle
      - scenario: Encoded ARN path from SDK
        status: fixed
        evidence: TestTags_encodedARNPath
      - scenario: Tag count, key/value length, aws: prefix, and regex validation
        status: fixed
        evidence: TestTagResource_emptyTagKey; TestTagResource_invalidTagPatterns; TestTagResource_jsonProtocolInvalidTagPattern
  UpdateGraphqlApi:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/appsync/latest/APIReference/API_UpdateGraphqlApi.html
    scenario_matrix:
      - scenario: Valid update preserves server-generated fields
        status: fixed
        evidence: TestUpdateGraphqlApi_success
      - scenario: Invalid authenticationType enum
        status: fixed
        evidence: TestUpdateGraphqlApi_invalidAuthenticationType
      - scenario: Missing required name through AWS JSON protocol
        status: fixed
        evidence: TestUpdateGraphqlApi_jsonProtocolMissingName
findings:
    fixed:
      - CreateGraphqlApi HTTP status and top-level request validation now better match AWS docs.
      - CloudFormation AWS::AppSync::GraphQLApi now translates CDK/CloudFormation Tags arrays to AppSync CreateGraphqlApi tag maps before dispatching.
      - Typed CreateGraphqlApi now includes the tags request field so SDK protocol variants do not drop create-time tags; covered by TestCreateGraphqlApi_jsonProtocolTags.
      - CloudFormation now provisions AppSync Events APIs and channel namespaces through the real Events API routes instead of stubbing them.
      - Typed CreateGraphqlApi now carries ownerContact into shared validation; covered by TestCreateGraphqlApi_jsonProtocolOwnerContactTooLong.
      - CreateApiKey now accepts CDK-style absolute Expires values 365 days from creation; covered by TestApiKey_createWithCdkStyleUpperBoundExpires and TestCreateStack_AppSyncApiKeyWithCdkStyleUpperBoundExpires.
      - StartSchemaCreation now accepts AppSync built-in auth and subscription directives in uploaded SDL; covered by TestSchema_appSyncDirectives and TestCreateStack_AppSyncGraphQLSchemaWithAwsDirectives.
      - StartSchemaCreation now accepts AppSync built-in scalar types in uploaded SDL; covered by TestSchema_appSyncScalars and TestCreateStack_AppSyncGraphQLSchemaWithAwsScalars.
      - StartSchemaCreation now rejects user-defined custom scalars and custom object types with the reserved AWS prefix; covered by TestSchema_customScalar and TestSchema_customTypeWithAWSPrefix.
      - Direct Lambda resolver events now include AWS/Powertools-compatible resolver context fields, and Lambda data source invocations with evaluated request mapping templates pass that mapped JSON to Lambda instead of always using the direct context.
      - AppSync resolver identities now expose closer AWS-shaped Cognito, OIDC, IAM, and Lambda-authorizer-stub fields, and direct resolver request context omits Cookie with null default endpoint domainName.
      - Configured AWS_LAMBDA authorizers are now invoked with AWS-shaped authorization events and propagate resolverContext into resolver identity.
      - Lambda authorizer deniedFields now null denied resolver fields, mapped Lambda request objects validate operation/invocationType and support Event invocation null results, and direct Lambda nested list batching is implemented for maxBatchSize resolvers.
      - Direct Lambda resolver events now carry pipeline stash and prev.result when invoked from pipeline functions, and deniedFields matching avoids cross-API full-ARN bleed-through.
  remaining_gaps:
    - Continue typed protocol validation tests beyond the UpdateGraphqlApi missing-name, TagResource invalid-key, and CreateGraphqlApi ownerContact boundary cases.
    - Audit support claims category by category.
    - Downgrade or annotate config-only and inert behavior where AWS compatibility is limited.
    - Continue CreateGraphqlApi boundary/nested-config coverage before marking reviewed.
    - Complete Lambda authorizer cache behavior, broader nested batching scheduler verification, and pipeline scenario coverage before marking LambdaResolverExecution reviewed.
  intentionally_partial: []
