findings:
  fixed:
    - Username-attribute pools now resolve email/phone sign-in identifiers through the shared user lookup path for admin, auth, challenge, MFA, group, and self-service operations that call the shared helpers.
    - Shared user lookup now resolves local user sub values for Username parameters in plain username pools.
    - AdminDeleteUser now deletes the resolved internal UUID username instead of attempting to delete by email/phone identifier.
    - SignUp now stores a generated UUID username for username-attribute pools and auto-populates the corresponding email or phone attribute.
    - Secret clients now require SECRET_HASH in AdminInitiateAuth password auth and RespondToAuthChallenge/AdminRespondToAuthChallenge ChallengeResponses.
    - AdminCreateUser now persists AliasAttributes, resolves verified email/phone aliases for sign-in, rejects duplicate verified aliases, and migrates aliases when ForceAliasCreation is true.
    - ConfirmSignUp now rejects duplicate verified aliases unless ForceAliasCreation is true, migrates email/phone alias ownership when forced, and returns a Session field on success.
    - InitiateAuth and AdminInitiateAuth now accept USER_AUTH with a ConfirmSignUp Session and return tokens for immediate post-confirmation sign-in.
    - InitiateAuth/AdminInitiateAuth USER_AUTH now return SELECT_CHALLENGE with PASSWORD/EMAIL_OTP/SMS_OTP available when permitted, and RespondToAuthChallenge/AdminRespondToAuthChallenge complete PASSWORD and OTP choice authentication.
    - InitiateAuth/AdminInitiateAuth now support USER_SRP_AUTH and USER_AUTH PASSWORD_SRP with AWS-shaped PASSWORD_VERIFIER challenges and verifier responses that return tokens.
    - SetUserPoolMfaConfig/GetUserPoolMfaConfig now store and return WebAuthnConfiguration, StartWebAuthnRegistration/CompleteWebAuthnRegistration register passkey metadata, and USER_AUTH can complete WEB_AUTHN sign-in with AWS-shaped credential request options.
    - DeviceConfiguration now triggers NewDeviceMetadata on sign-in, ConfirmDevice stores remembered devices, GetDevice/ListDevices/UpdateDeviceStatus/ForgetDevice and admin device management operations work on confirmed devices, and remembered DEVICE_KEY sign-in completes DEVICE_SRP_AUTH/DEVICE_PASSWORD_VERIFIER challenge shapes.
    - InitiateAuth USER_AUTH with PREFERRED_CHALLENGE=PASSWORD now returns a direct PASSWORD challenge, and RespondToAuthChallenge completes it with PASSWORD.
    - AdminInitiateAuth USER_AUTH with PREFERRED_CHALLENGE=PASSWORD now returns a direct PASSWORD challenge, and AdminRespondToAuthChallenge completes it with PASSWORD.
    - InitiateAuth/AdminInitiateAuth USER_AUTH unavailable preferred challenges now fall back to SELECT_CHALLENGE with PASSWORD available.
    - CreateUserPool/UpdateUserPool now store, validate, and return SignInPolicy.AllowedFirstAuthFactors; password-based USER_AUTH respects PASSWORD first-factor availability.
    - CreateUserPoolClient/UpdateUserPoolClient now store and validate ExplicitAuthFlows, and InitiateAuth/AdminInitiateAuth enforce ALLOW_USER_AUTH for USER_AUTH.
    - AdminUpdateUserAttributes now rejects duplicate verified email/phone aliases when an update would immediately verify the alias.
    - UserAttributeUpdateSettings is stored and returned on user pools; UpdateUserAttributes and AdminUpdateUserAttributes now create pending email/phone changes when verification before update is required, VerifyUserAttribute applies pending values with *_verified=true, and GetUserAttributeVerificationCode resends pending attribute verification codes.
    - ListUsers now supports documented standard-attribute filters, AttributesToGet shaping/validation, and Limit/PaginationToken pagination.
    - ListGroups, AdminListGroupsForUser, and ListUsersInGroup now support Limit/NextToken pagination.
    - Malformed persisted pool, client, or user records are isolated so they do not turn Cognito list/admin APIs into service-wide InternalError responses.
  remaining_gaps:
    - SRP challenge parameters and verifier response shape are emulated, but full cryptographic SRP proof validation is intentionally partial.
    - Device SRP challenge parameters and verifier response shape are emulated, but full cryptographic device SRP proof validation is intentionally partial.
    - Review exact device validation errors, user ListDevices pagination edge cases, and opt-in confirmation behavior.
    - WebAuthn challenge and registration shapes are emulated, but attestation/assertion cryptographic validation and exact origin/RP mismatch errors are intentionally partial.
    - Review app-tier restrictions for ALLOW_USER_AUTH.
    - Review app-tier restrictions for SignInPolicy and ALLOW_USER_AUTH.
    - Review exact verification-code TTL, throttling, delivery failures, and Lambda ClientMetadata behavior.
    - Review exact ListUsers invalid-filter validation parity.
    - Review SECRET_HASH expectations when username aliases are used.
    - Review all challenge flows, including MFA and NEW_PASSWORD_REQUIRED, against AWS docs.
    - Review every admin user operation that accepts Username for validation, errors, and response shape.
  intentionally_partial:
    - SRP proof validation is not cryptographically verified; verifier responses are shape-checked and complete authentication for SDK-compatible local testing.
    - Device SRP proof validation is not cryptographically verified; DEVICE_PASSWORD_VERIFIER responses are shape-checked and complete authentication for SDK-compatible local testing.
    - CUSTOM_AUTH Lambda Define/Create/Verify triggers, challenge answer verification, and repeated custom-challenge loops are not executed; Overcast emits AWS-shaped challenge/session responses and accepts ANSWER for SDK-compatible local testing.
    - WebAuthn attestation/assertion signatures, origin validation, and relying-party mismatch validation are not cryptographically verified; credential metadata and challenge shapes are emulated for SDK-compatible local testing.
