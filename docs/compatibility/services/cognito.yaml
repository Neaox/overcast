  RespondToAuthChallenge:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_RespondToAuthChallenge.html
      - https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-attributes.html
    tests:
      - tests/integration/cognito/cognito_username_attributes_test.go
      - tests/integration/cognito/cognito_user_auth_test.go
    scenarios:
      - name: SELECT_CHALLENGE with PASSWORD answer
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Password choice challenge validates the USER_AUTH session, ANSWER=PASSWORD, and PASSWORD before returning AuthenticationResult tokens.
      - name: PASSWORD challenge response
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Direct PASSWORD challenge from PREFERRED_CHALLENGE=PASSWORD validates the USER_AUTH session and PASSWORD before returning AuthenticationResult tokens.
      - name: username-attribute pool NEW_PASSWORD_REQUIRED using email
        status: fixed
        tests:
          - tests/integration/cognito/cognito_username_attributes_test.go
        notes: Session completion resolves generated UUID user.
      - name: secret client challenge response requires SECRET_HASH
        status: fixed
        tests:
          - tests/integration/cognito/cognito_secrethash_test.go
        notes: Missing SECRET_HASH in ChallengeResponses returns InvalidParameterException.
    evidence:
      - AWS RespondToAuthChallenge docs state SELECT_CHALLENGE can complete PASSWORD authentication with ANSWER, USERNAME, and PASSWORD.
      - AWS RespondToAuthChallenge docs state PASSWORD challenges use USERNAME and PASSWORD responses.
      - NEW_PASSWORD_REQUIRED flow succeeds when initial auth used email as USERNAME.
      - AWS API docs state all challenge responses require SECRET_HASH when the app client has a client secret.
    gaps:
      - ChallengeResponses USERNAME edge cases not fully reviewed.
      - MFA challenge behavior not fully reviewed.
    next_action: Review all challenge flows against AWS docs.
  AdminInitiateAuth:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_AdminInitiateAuth.html
      - https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_ConfirmSignUp.html
    tests:
      - tests/integration/cognito/cognito_secrethash_test.go
      - tests/integration/cognito/cognito_aliases_test.go
    scenarios:
      - name: secret client password auth requires SECRET_HASH
        status: fixed
        tests:
          - tests/integration/cognito/cognito_secrethash_test.go
        notes: ADMIN_USER_PASSWORD_AUTH validates SECRET_HASH before password auth.
      - name: USER_AUTH with ConfirmSignUp Session
        status: fixed
        tests:
          - tests/integration/cognito/cognito_aliases_test.go
        notes: Uses the ConfirmSignUp Session to return AuthenticationResult tokens without resubmitting the confirmation code.
      - name: USER_AUTH password choice start
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: USER_AUTH with USERNAME returns SELECT_CHALLENGE, AvailableChallenges=[PASSWORD], ChallengeParameters.USERNAME, and a Session.
      - name: USER_AUTH preferred PASSWORD start
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: USER_AUTH with PREFERRED_CHALLENGE=PASSWORD returns a direct PASSWORD challenge, AvailableChallenges=[PASSWORD], ChallengeParameters.USERNAME, and a Session.
      - name: USER_AUTH unavailable preferred challenge fallback
        status: reviewed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: USER_AUTH with an unavailable preferred challenge such as WEB_AUTHN falls back to SELECT_CHALLENGE with available local factors.
      - name: USER_AUTH EMAIL_OTP choice flow
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: EMAIL_OTP is offered when AllowedFirstAuthFactors permits it and the user has an email attribute; SELECT_CHALLENGE starts an EMAIL_OTP challenge and the code response returns tokens.
      - name: USER_SRP_AUTH flow
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: USER_SRP_AUTH requires USERNAME and SRP_A, returns PASSWORD_VERIFIER with SALT/SRP_B/SECRET_BLOCK/USER_ID_FOR_SRP, and AdminRespondToAuthChallenge accepts PASSWORD_CLAIM_SIGNATURE/PASSWORD_CLAIM_SECRET_BLOCK/TIMESTAMP to return tokens. Cryptographic SRP proof validation is intentionally partial.
      - name: USER_AUTH WEB_AUTHN preferred challenge
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Registered passkey users can request PREFERRED_CHALLENGE=WEB_AUTHN and receive CREDENTIAL_REQUEST_OPTIONS before completing WEB_AUTHN with a credential. WebAuthn assertion signature validation is intentionally partial.
      - name: CUSTOM_AUTH direct custom challenge
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: CUSTOM_AUTH requires ALLOW_CUSTOM_AUTH or legacy CUSTOM_AUTH_FLOW_ONLY, returns CUSTOM_CHALLENGE with a Session for direct custom challenge starts, and AdminRespondToAuthChallenge completes CUSTOM_CHALLENGE with ANSWER to issue tokens. Lambda trigger execution and answer verification are intentionally partial.
      - name: CUSTOM_AUTH SRP prelude
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: CUSTOM_AUTH with CHALLENGE_NAME=SRP_A and SRP_A returns PASSWORD_VERIFIER challenge parameters before the custom challenge. Cryptographic SRP proof validation and Lambda-defined challenge sequencing are intentionally partial.
      - name: remembered-device sign-in
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: With DeviceConfiguration enabled, password sign-in without DEVICE_KEY returns NewDeviceMetadata; after ConfirmDevice stores a remembered device, password sign-in with DEVICE_KEY returns DEVICE_SRP_AUTH. Device SRP cryptographic proof validation is intentionally partial.
      - name: USER_AUTH app-client ExplicitAuthFlows enforcement
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Clients without ALLOW_USER_AUTH return UnsupportedOperationException for USER_AUTH.
      - name: user-pool first-factor policy excludes PASSWORD
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Password-only USER_AUTH returns InvalidUserPoolConfigurationException when SignInPolicy.AllowedFirstAuthFactors excludes PASSWORD.
    evidence:
      - AWS API docs state AdminInitiateAuth AuthParameters include SECRET_HASH when the app client has a client secret.
      - AWS AdminInitiateAuth docs state Session from ConfirmSignUp can be used with USER_AUTH for direct sign-in.
      - AWS AdminInitiateAuth docs state USER_AUTH with USERNAME returns choice-based authentication challenges.
      - AWS AdminInitiateAuth docs state PREFERRED_CHALLENGE can request a preferred USER_AUTH challenge.
      - AWS AdminInitiateAuth docs state Cognito returns SELECT_CHALLENGE with available options when a preferred challenge isn't available.
      - AWS AdminInitiateAuth docs state USER_SRP_AUTH requires USERNAME and SRP_A and returns PASSWORD_VERIFIER SRP challenge parameters.
      - AWS AdminInitiateAuth docs state USER_AUTH can return WEB_AUTHN with CREDENTIAL_REQUEST_OPTIONS for passkey sign-in.
      - AWS AdminInitiateAuth docs state CUSTOM_AUTH requires USERNAME and can start custom challenge flows, including CHALLENGE_NAME=SRP_A with SRP_A for SRP-before-custom authentication.
      - AWS device-tracking docs state sign-in without DEVICE_KEY returns NewDeviceMetadata and remembered DEVICE_KEY sign-in returns DEVICE_SRP_AUTH before token issuance.
      - AWS app-client docs state USER_AUTH requires ALLOW_USER_AUTH in ExplicitAuthFlows and defaults don't include it.
      - AWS SignInPolicy docs state AllowedFirstAuthFactors controls permitted first factors for a user pool.
    gaps:
      - CUSTOM_AUTH Lambda Define/Create/Verify trigger execution, multiple custom-challenge loops, and answer verification are intentionally partial.
      - Device SRP verifier cryptographic proof validation is intentionally partial.
      - Device opt-in confirmation edge cases, exact validation errors, and user ListDevices pagination are not fully reviewed.
      - SRP responses use AWS-shaped challenge parameters but don't perform full cryptographic proof validation.
      - WebAuthn registration and assertion responses are accepted with AWS-shaped fields but don't perform attestation/assertion cryptographic validation.
    next_action: Review exact device validation errors and opt-in confirmation edge cases.
  AdminRespondToAuthChallenge:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_AdminRespondToAuthChallenge.html
    tests:
      - tests/integration/cognito/cognito_secrethash_test.go
      - tests/integration/cognito/cognito_user_auth_test.go
    scenarios:
      - name: SELECT_CHALLENGE with PASSWORD answer
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Admin password choice challenge validates the USER_AUTH session, ANSWER=PASSWORD, and PASSWORD before returning AuthenticationResult tokens.
      - name: PASSWORD challenge response
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Direct admin PASSWORD challenge from PREFERRED_CHALLENGE=PASSWORD validates the USER_AUTH session and PASSWORD before returning AuthenticationResult tokens.
      - name: secret client challenge response requires SECRET_HASH
        status: fixed
        tests:
          - tests/integration/cognito/cognito_secrethash_test.go
        notes: Missing SECRET_HASH in ChallengeResponses returns InvalidParameterException.
      - name: PASSWORD_VERIFIER SRP response
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Accepts PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, and TIMESTAMP for SRP sessions and returns tokens. Cryptographic SRP proof validation is intentionally partial.
      - name: CUSTOM_CHALLENGE response
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Accepts ANSWER for CUSTOM_AUTH sessions and returns tokens. Lambda trigger execution and answer verification are intentionally partial.
      - name: DEVICE_SRP_AUTH and DEVICE_PASSWORD_VERIFIER responses
        status: fixed
        tests:
          - tests/integration/cognito/cognito_user_auth_test.go
        notes: Accepts DEVICE_KEY and SRP_A for remembered-device sessions, returns DEVICE_PASSWORD_VERIFIER, and accepts PASSWORD_CLAIM_SIGNATURE/PASSWORD_CLAIM_SECRET_BLOCK/TIMESTAMP to issue tokens. Device SRP cryptographic validation is intentionally partial.
    evidence:
      - AWS AdminRespondToAuthChallenge docs state SELECT_CHALLENGE can complete PASSWORD authentication with ANSWER, USERNAME, and PASSWORD.
      - AWS AdminRespondToAuthChallenge docs state PASSWORD challenges use USERNAME and PASSWORD responses.
      - AWS AdminRespondToAuthChallenge docs state PASSWORD_VERIFIER responses include PASSWORD_CLAIM_SIGNATURE, PASSWORD_CLAIM_SECRET_BLOCK, TIMESTAMP, and USERNAME.
      - AWS AdminRespondToAuthChallenge docs state CUSTOM_CHALLENGE responses include USERNAME and ANSWER.
      - AWS AdminRespondToAuthChallenge docs include DEVICE_SRP_AUTH and DEVICE_PASSWORD_VERIFIER as device-auth challenge responses.
      - AWS API docs state all admin challenge responses require SECRET_HASH when the app client has a client secret.
    gaps:
      - ChallengeResponses USERNAME edge cases not fully reviewed.
      - CUSTOM_AUTH Lambda trigger execution and repeated custom-challenge loops are intentionally partial.
      - Device SRP verifier cryptographic proof validation is intentionally partial.
      - MFA challenge behavior not fully reviewed.
    next_action: Review all admin challenge flows against AWS docs.
