  AdminUpdateUserAttributes:
    status: fixed
    aws_docs:
      - https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_AdminUpdateUserAttributes.html
    tests:
      - tests/integration/cognito/cognito_aliases_test.go
      - tests/integration/cognito/cognito_attributes_test.go
    scenarios:
      - name: duplicate verified email alias
        status: fixed
        tests:
          - tests/integration/cognito/cognito_aliases_test.go
        notes: Updating email and email_verified=true rejects an alias already verified on another user.
      - name: duplicate verified phone alias
        status: fixed
        tests:
          - tests/integration/cognito/cognito_aliases_test.go
        notes: Updating phone_number and phone_number_verified=true rejects an alias already verified on another user.
      - name: verification-before-update delayed update
        status: fixed
        tests:
          - tests/integration/cognito/cognito_attributes_test.go
        notes: When UserAttributeUpdateSettings requires verification, admin updates to email/phone_number create a pending update and leave the current value unchanged unless the request also sets the corresponding *_verified=true flag.
    evidence:
      - AWS AdminUpdateUserAttributes docs list AliasExistsException and state email_verified/phone_number_verified=true permits immediate sign-in.
      - AWS AdminUpdateUserAttributes docs state required-verification updates don't immediately change the stored attribute unless email_verified/phone_number_verified=true is included.
    gaps: []
    next_action: Include in broader admin-user operation validation sweep.
